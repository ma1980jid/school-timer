<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>تنظيف كاش مؤقت الحصص</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Tahoma,Arial,sans-serif;background:#f6f1e8;color:#0f172a;padding:18px;text-align:center}
    .card{width:min(620px,100%);background:#fff;border:1px solid #d9e3df;border-radius:24px;padding:24px;box-shadow:0 18px 45px rgba(15,23,42,.12)}
    h1{margin:0 0 12px;color:#0f766e;font-size:28px}p{font-weight:900;line-height:1.9;margin:8px 0}.status{background:#ecfeff;border:1px solid #99f6e4;border-radius:16px;padding:12px;color:#0f766e}.btn{margin-top:14px;border:0;border-radius:14px;background:#0f766e;color:#fff;font-family:Tahoma,Arial,sans-serif;font-weight:900;padding:12px 18px;cursor:pointer}.small{font-size:13px;color:#64748b;word-break:break-all;direction:ltr}
  </style>
</head>
<body>
  <main class="card">
    <h1>تنظيف كاش مؤقت الحصص</h1>
    <p class="status" id="status">جارٍ تنظيف كاش التطبيق والبيانات القديمة...</p>
    <p>بعد التنظيف سيتم فتح رابط المدرسة من جديد.</p>
    <p class="small" id="target">--</p>
    <button class="btn" id="retry" type="button" style="display:none">فتح رابط المدرسة</button>
  </main>

  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const school = (params.get('school') || 'alsheikh-saif').trim();
      const view = (params.get('view') || 'mobile').trim();
      const status = document.getElementById('status');
      const target = document.getElementById('target');
      const retry = document.getElementById('retry');

      function viewerUrl(){
        const url = new URL('index.html', location.href);
        url.searchParams.set('school', school);
        url.searchParams.set('view', view);
        url.searchParams.set('v', 'reset-' + Date.now());
        return url.toString();
      }

      function setStatus(text){ status.textContent = text; }

      async function clearServiceWorkers(){
        if (!('serviceWorker' in navigator)) return;
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((reg) => reg.unregister().catch(() => false)));
      }

      async function clearCaches(){
        if (!('caches' in window)) return;
        const keys = await caches.keys();
        await Promise.all(keys.map((key) => caches.delete(key).catch(() => false)));
      }

      function clearStorage(){
        try {
          Object.keys(localStorage).forEach((key) => {
            if (String(key || '').startsWith('school_timer_')) localStorage.removeItem(key);
          });
        } catch (error) {}
        try { sessionStorage.clear(); } catch (error) {}
      }

      async function run(){
        const next = viewerUrl();
        target.textContent = next;
        retry.onclick = () => location.replace(next);
        try {
          setStatus('1 من 3: جارٍ إيقاف Service Worker القديم...');
          await clearServiceWorkers();
          setStatus('2 من 3: جارٍ حذف ملفات الكاش...');
          await clearCaches();
          setStatus('3 من 3: جارٍ حذف بيانات المدرسة القديمة...');
          clearStorage();
          setStatus('تم التنظيف بنجاح. جارٍ فتح رابط المدرسة...');
          setTimeout(() => location.replace(next), 900);
        } catch (error) {
          setStatus('تمت محاولة التنظيف. اضغط الزر لفتح رابط المدرسة.');
          retry.style.display = 'inline-block';
        }
      }

      run();
    })();
  </script>
</body>
</html>
