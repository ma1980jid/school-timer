<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة الرسائل التربوية</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <section class="schedule-card">
      <div class="section-title">
        <h2>إدارة الرسائل التربوية</h2>
        <span id="schoolName">جاري التحميل...</span>
      </div>

      <div id="statusBox" class="alert-bar hidden"></div>

      <div style="display:grid; gap:10px; margin-bottom:18px;">
        <input id="messageText" type="text" placeholder="اكتب الرسالة التربوية" />
        <input id="messageType" type="text" placeholder="نوع الرسالة: تربوية / تحفيزية / تعليمية" />
        <button class="admin-btn" onclick="addMessage()">إضافة رسالة</button>
      </div>

      <div id="messagesList" class="schedule-list"></div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="messages.js"></script>
</body>
</html>
