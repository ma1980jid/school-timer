<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة مدير النظام</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <section class="schedule-card">
      <div class="section-title">
        <h2>لوحة مدير النظام</h2>
        <span>إدارة المدارس</span>
      </div>

      <div id="systemStatus" class="alert-bar hidden"></div>

      <div style="display:grid; gap:10px; margin-bottom:18px;">
        <input id="schoolNameInput" type="text" placeholder="اسم المدرسة" />
        <input id="schoolSlugInput" type="text" placeholder="الرابط المختصر مثال: alsheikh-saif" />
        <input id="governorateInput" type="text" placeholder="المحافظة" />
        <input id="wilayatInput" type="text" placeholder="الولاية" />

        <button class="admin-btn" onclick="addSchool()">إضافة مدرسة جديدة</button>
      </div>
    </section>

    <section class="schedule-card">
      <div class="section-title">
        <h2>المدارس المسجلة</h2>
        <span id="schoolsCount">0 مدرسة</span>
      </div>

      <div id="schoolsList" class="schedule-list"></div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="system.js"></script>
</body>
</html>
