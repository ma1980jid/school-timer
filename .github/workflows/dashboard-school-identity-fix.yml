name: Dashboard school identity fix

on:
  push:
    branches: ["dashboard-fix-staging-2026-07-12"]
    paths:
      - ".github/workflows/dashboard-school-identity-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: dashboard-fix-staging-2026-07-12
          fetch-depth: 0

      - name: Verify stable source files
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object dashboard-v2.html)" = "4bac200fc660fd1c672d331e4f7535b7f87a6e48"
          test "$(git hash-object dashboard-center-school-name.js)" = "8e200e2b3eb7a1ce98a44a68fefe97b9dcb73d66"
          test "$(git hash-object dashboard-v2-fixes.js)" = "a3547c0bfb332697d1f2a9e97eb530b956a9a1b8"

      - name: Add local Supabase fallback
        shell: bash
        run: |
          cat > dashboard-supabase-fallback.js <<'EOF'
          (function(){
            'use strict';
            if (window.supabase && typeof window.supabase.createClient === 'function') return;

            function encodePath(path){
              return String(path || '').split('/').map(encodeURIComponent).join('/');
            }

            function createClient(baseUrl, anonKey){
              const root = String(baseUrl || '').replace(/\/$/, '');
              const authHeaders = { apikey: anonKey, Authorization: 'Bearer ' + anonKey };

              class QueryBuilder {
                constructor(table){
                  this.table = table;
                  this.method = 'GET';
                  this.body = null;
                  this.params = new URLSearchParams();
                  this.singleMode = false;
                  this.maybeSingleMode = false;
                  this.upsertMode = false;
                }
                select(columns='*'){
                  this.params.set('select', columns);
                  return this;
                }
                insert(payload){ this.method = 'POST'; this.body = payload; return this; }
                upsert(payload, options={}){
                  this.method = 'POST';
                  this.body = payload;
                  this.upsertMode = true;
                  if (options.onConflict) this.params.set('on_conflict', options.onConflict);
                  return this;
                }
                update(payload){ this.method = 'PATCH'; this.body = payload; return this; }
                delete(){ this.method = 'DELETE'; return this; }
                eq(column, value){ this.params.append(column, 'eq.' + String(value)); return this; }
                neq(column, value){ this.params.append(column, 'neq.' + String(value)); return this; }
                gt(column, value){ this.params.append(column, 'gt.' + String(value)); return this; }
                gte(column, value){ this.params.append(column, 'gte.' + String(value)); return this; }
                lt(column, value){ this.params.append(column, 'lt.' + String(value)); return this; }
                lte(column, value){ this.params.append(column, 'lte.' + String(value)); return this; }
                like(column, value){ this.params.append(column, 'like.' + String(value)); return this; }
                ilike(column, value){ this.params.append(column, 'ilike.' + String(value)); return this; }
                is(column, value){ this.params.append(column, 'is.' + String(value)); return this; }
                in(column, values){
                  const list = Array.isArray(values) ? values.map((v) => String(v)).join(',') : String(values || '');
                  this.params.append(column, 'in.(' + list + ')');
                  return this;
                }
                not(column, operator, value){
                  this.params.append(column, 'not.' + String(operator) + '.' + String(value));
                  return this;
                }
                match(values){
                  Object.entries(values || {}).forEach(([key, value]) => this.eq(key, value));
                  return this;
                }
                or(expression){ this.params.set('or', '(' + String(expression || '') + ')'); return this; }
                order(column, options={}){
                  this.params.append('order', column + '.' + (options.ascending === false ? 'desc' : 'asc'));
                  return this;
                }
                limit(value){ this.params.set('limit', String(value)); return this; }
                range(from, to){
                  this.rangeFrom = Number(from);
                  this.rangeTo = Number(to);
                  return this;
                }
                single(){ this.singleMode = true; return this; }
                maybeSingle(){ this.maybeSingleMode = true; return this; }
                then(resolve, reject){ return this.execute().then(resolve, reject); }
                catch(reject){ return this.execute().catch(reject); }
                finally(handler){ return this.execute().finally(handler); }

                async execute(){
                  try {
                    const query = this.params.toString();
                    const url = root + '/rest/v1/' + encodeURIComponent(this.table) + (query ? '?' + query : '');
                    const headers = { ...authHeaders };
                    const options = { method: this.method, headers };

                    if (Number.isFinite(this.rangeFrom) && Number.isFinite(this.rangeTo)) {
                      headers.Range = this.rangeFrom + '-' + this.rangeTo;
                    }

                    if (this.method !== 'GET') {
                      headers['Content-Type'] = 'application/json';
                      const prefer = [];
                      if (this.upsertMode) prefer.push('resolution=merge-duplicates');
                      prefer.push('return=representation');
                      headers.Prefer = prefer.join(',');
                      if (this.body !== null) options.body = JSON.stringify(this.body);
                    }

                    if (this.singleMode || this.maybeSingleMode) {
                      headers.Accept = 'application/vnd.pgrst.object+json';
                    }

                    const response = await fetch(url, options);
                    const text = await response.text();
                    let data = null;
                    if (text) {
                      try { data = JSON.parse(text); }
                      catch (error) { data = text; }
                    }

                    if (this.maybeSingleMode && response.status === 406) {
                      return { data: null, error: null, status: response.status, statusText: response.statusText };
                    }

                    if (!response.ok) {
                      const message = data && typeof data === 'object'
                        ? (data.message || data.error_description || data.hint || response.statusText)
                        : String(data || response.statusText);
                      return {
                        data: null,
                        error: { message, details: data && data.details, hint: data && data.hint, code: data && data.code },
                        status: response.status,
                        statusText: response.statusText
                      };
                    }

                    if ((this.singleMode || this.maybeSingleMode) && Array.isArray(data)) {
                      data = data[0] || null;
                    }

                    return { data, error: null, status: response.status, statusText: response.statusText };
                  } catch (error) {
                    return { data: null, error: { message: error && error.message ? error.message : String(error) } };
                  }
                }
              }

              return {
                from(table){ return new QueryBuilder(table); },
                storage: {
                  from(bucket){
                    return {
                      async upload(path, file, options={}){
                        try {
                          const headers = { ...authHeaders, 'x-upsert': options.upsert ? 'true' : 'false' };
                          headers['Content-Type'] = options.contentType || (file && file.type) || 'application/octet-stream';
                          const response = await fetch(root + '/storage/v1/object/' + encodeURIComponent(bucket) + '/' + encodePath(path), {
                            method: 'POST', headers, body: file
                          });
                          const text = await response.text();
                          let data = null;
                          if (text) {
                            try { data = JSON.parse(text); }
                            catch (error) { data = text; }
                          }
                          if (!response.ok) {
                            const message = data && typeof data === 'object' ? (data.message || data.error || response.statusText) : String(data || response.statusText);
                            return { data: null, error: { message, status: response.status } };
                          }
                          return { data: data || { path }, error: null };
                        } catch (error) {
                          return { data: null, error: { message: error && error.message ? error.message : String(error) } };
                        }
                      },
                      getPublicUrl(path){
                        return { data: { publicUrl: root + '/storage/v1/object/public/' + encodeURIComponent(bucket) + '/' + encodePath(path) } };
                      }
                    };
                  }
                }
              };
            }

            window.supabase = { createClient };
            window.SCHOOL_TIMER_USING_DASHBOARD_SUPABASE_FALLBACK = true;
          })();
          EOF
          node --check dashboard-supabase-fallback.js

      - name: Patch only the dashboard connection and identity defaults
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          dashboard = Path('dashboard-v2.html')
          text = dashboard.read_text(encoding='utf-8')
          old = '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script>'
          new = '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="dashboard-supabase-fallback.js?v=dashboard-fallback-01"></script><script src="supabase-config.js?v=optimized-03"></script>'
          if text.count(old) != 1:
              raise SystemExit('Unexpected dashboard script sequence')
          dashboard.write_text(text.replace(old, new, 1), encoding='utf-8')

          center = Path('dashboard-center-school-name.js')
          text = center.read_text(encoding='utf-8')
          old1 = "const schoolName = String(name || '').trim() || 'مدرسة الشيخ سيف بن حمد الأغبري';"
          new1 = "const schoolName = String(name || '').trim() || (getSchoolSlug() === 'alsheikh-saif' ? 'مدرسة الشيخ سيف بن حمد الأغبري' : 'جارٍ تحميل بيانات المدرسة...');"
          old2 = "setSchoolName('مدرسة الشيخ سيف بن حمد الأغبري');"
          new2 = "setSchoolName(getSchoolSlug() === 'alsheikh-saif' ? 'مدرسة الشيخ سيف بن حمد الأغبري' : 'جارٍ تحميل بيانات المدرسة...');"
          if text.count(old1) != 1 or text.count(old2) != 1:
              raise SystemExit('Unexpected center school name source')
          center.write_text(text.replace(old1, new1, 1).replace(old2, new2, 1), encoding='utf-8')

          fixes = Path('dashboard-v2-fixes.js')
          text = fixes.read_text(encoding='utf-8')
          old1 = "const schoolName = String(name || '').trim() || 'مدرسة الشيخ سيف بن حمد الأغبري';"
          new1 = "const schoolName = String(name || '').trim() || (getSchoolSlug() === 'alsheikh-saif' ? 'مدرسة الشيخ سيف بن حمد الأغبري' : 'جارٍ تحميل بيانات المدرسة...');"
          old2 = "if (!setDashboardSchoolName('مدرسة الشيخ سيف بن حمد الأغبري')) return;"
          new2 = "if (!setDashboardSchoolName(getSchoolSlug() === 'alsheikh-saif' ? 'مدرسة الشيخ سيف بن حمد الأغبري' : 'جارٍ تحميل بيانات المدرسة...')) return;"
          if text.count(old1) != 1 or text.count(old2) != 1:
              raise SystemExit('Unexpected dashboard fixes school name source')
          fixes.write_text(text.replace(old1, new1, 1).replace(old2, new2, 1), encoding='utf-8')
          PY

          node --check dashboard-center-school-name.js
          node --check dashboard-v2-fixes.js
          grep -q 'dashboard-supabase-fallback.js?v=dashboard-fallback-01' dashboard-v2.html
          grep -q 'جارٍ تحميل بيانات المدرسة' dashboard-center-school-name.js
          grep -q 'جارٍ تحميل بيانات المدرسة' dashboard-v2-fixes.js

      - name: Validate changed file scope
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/dashboard-school-identity-fix.yml
          mapfile -t files < <(git status --short | sed 's/^...//' | sort)
          printf '%s\n' "${files[@]}"
          expected=$(printf '%s\n' dashboard-center-school-name.js dashboard-supabase-fallback.js dashboard-v2-fixes.js dashboard-v2.html .github/workflows/dashboard-school-identity-fix.yml | sort)
          actual=$(printf '%s\n' "${files[@]}" | sort)
          test "$actual" = "$expected"

      - name: Commit validated staging repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix dashboard school identity without changing design"
          git push origin HEAD:dashboard-fix-staging-2026-07-12
