<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f2e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>مؤقّت الحصص</title>
  <link rel="stylesheet" href="style.css?v=cards-clock-02">
  <style>
    @media (max-width: 768px){
      .schedule-section{top:61.2%!important;height:32.8%!important;left:8.2%!important;right:6.2%!important;overflow:hidden!important;padding:0!important;background:transparent!important}
      .schedule-grid{height:100%!important;padding:8px 8px 7px!important;gap:1.6%!important;align-content:stretch!important;display:grid!important;grid-template-columns:1fr 1fr!important;background:transparent!important}
      .schedule-grid table{display:block!important;width:100%!important;height:100%!important;border-collapse:collapse!important;border-spacing:0!important;table-layout:fixed!important;background:transparent!important;overflow:visible!important}
      .schedule-grid tbody{display:flex!important;flex-direction:column!important;justify-content:space-between!important;height:100%!important;width:100%!important;gap:0!important;background:transparent!important;overflow:visible!important}
      .schedule-grid tr{display:grid!important;grid-template-columns:32% 44% 24%!important;align-items:center!important;justify-items:center!important;height:15.6%!important;min-height:0!important;background:transparent!important;border:0!important;box-shadow:none!important;overflow:visible!important}
      .schedule-grid td{display:flex!important;align-items:center!important;justify-content:center!important;text-align:center!important;width:100%!important;height:100%!important;min-width:0!important;padding:0 3px!important;line-height:1.15!important;font-size:clamp(9px,2.32vw,14.5px)!important;vertical-align:middle!important;overflow:visible!important;white-space:nowrap!important;background:transparent!important;border-bottom:1px solid rgba(6,75,53,.16)!important;color:#064b35!important;font-weight:900!important;letter-spacing:0!important;transform:none!important}
      .schedule-grid td:nth-child(1){font-size:clamp(9px,2.35vw,15px)!important;justify-content:center!important;padding-inline:3px!important;overflow:visible!important}
      .schedule-grid td:nth-child(2),.time-cell{font-size:clamp(9px,2.38vw,15px)!important;justify-content:center!important;padding-inline:2px!important;direction:ltr!important;color:#111!important;overflow:visible!important}
      .schedule-grid td:nth-child(3),.status-cell{font-size:clamp(8.5px,2.15vw,13px)!important;justify-content:center!important;padding-inline:7px!important;color:#0f766e!important;overflow:visible!important;min-width:34px!important}
      .current-row td{font-size:clamp(9px,2.38vw,15px)!important;background:transparent!important}
      .ticker{bottom:1.45%!important;height:4%!important;left:7.2%!important;right:7.2%!important;overflow:hidden!important;direction:ltr!important;display:flex!important;align-items:center!important;justify-content:flex-start!important}
      .ticker-track{display:flex!important;align-items:center!important;width:max-content!important;min-width:max-content!important;white-space:nowrap!important;will-change:transform!important;animation:mobileTickerMove 12s linear infinite!important;transform:translateX(-35%)}
      .ticker-group{display:flex!important;align-items:center!important;flex-shrink:0!important;white-space:nowrap!important;gap:6vw!important;padding-inline:2vw!important}
      .ticker-item{display:inline-flex!important;align-items:center!important;white-space:nowrap!important;font-size:clamp(15px,3.8vw,24px)!important;font-weight:900!important;color:#f7e6b0!important;line-height:1!important}
    }

    @keyframes mobileTickerMove{
      from{transform:translateX(-35%)}
      to{transform:translateX(0)}
    }
  </style>
</head>
<body>
  <main class="timer-app">
    <div class="school-logo-wrap">
      <img id="schoolLogo" src="icons/school_logo.png" alt="شعار المدرسة">
    </div>
    <section class="top-cards">
      <div class="period-card next-card"><div class="period-title">الحصة القادمة</div><div id="nextName" class="period-name">--</div><div class="period-line"></div><div id="nextTime" class="period-time">--</div></div>
      <div class="period-card current-card"><div class="period-title">الحصة الحالية</div><div id="currentName" class="period-name">--</div><div class="period-line"></div><div id="currentTime" class="period-time">--</div></div>
      <div class="period-card previous-card"><div class="period-title">الحصة السابقة</div><div id="previousName" class="period-name">--</div><div class="period-line"></div><div id="previousTime" class="period-time">--</div></div>
    </section>
    <section class="clock-panel">
      <div class="date-box"><strong id="weekday">--</strong><span id="gregorianDate">--</span><span id="hijriDate">--</span></div>
      <div class="clock-area"><div id="digitalClock" class="digital-clock">--:--</div><div id="countLabel" class="count-label">متبقي من الحصة الحالية</div><div id="remainingTime" class="remaining-time">--:--</div></div>
    </section>
    <section class="middle-cards">
      <div class="mini-card school-name-card"><p id="schoolName">مدرسة الشيخ سيف بن حمد الأغبري</p></div>
      <div class="mini-card vision-card"><p id="visionText">رؤيتنا: تعليم ملهم لمستقبل مشرق</p></div>
    </section>
    <section class="schedule-section"><div class="schedule-grid"><table><tbody id="scheduleCol1"></tbody></table><table><tbody id="scheduleCol2"></tbody></table></div></section>
    <footer class="ticker"><div id="tickerTrack" class="ticker-track"></div></footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js?v=supabase-read-02" defer></script>
</body>
</html>
