<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مدرسة الشيخ سيف بن حمد الأغبري</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="dashboard" aria-label="لوحة مدرسة الشيخ سيف بن حمد الأغبري التفاعلية">
    <img
      class="base-image"
      src="dashboard.png"
      width="1621"
      height="970"
      alt="تصميم لوحة مدرسة الشيخ سيف بن حمد الأغبري"
    />

    <section class="live-layer" aria-live="polite">
      <div class="top-card ended-card">
        <div>
          <div class="pill">الحصة المنتهية <span class="dot"></span></div>
          <div class="period-title" id="endedTitle">--</div>
          <div class="period-time" id="endedTime">--</div>
        </div>
      </div>

      <div class="top-card current-card">
        <div>
          <div class="pill">الحصة الحالية <span class="dot"></span></div>
          <div class="period-title" id="currentTitle">--</div>
          <div class="period-time" id="currentTime">--</div>
        </div>
      </div>

      <div class="top-card next-card">
        <div>
          <div class="pill">الحصة القادمة <span class="dot"></span></div>
          <div class="period-title" id="nextTitle">--</div>
          <div class="period-time" id="nextTime">--</div>
        </div>
      </div>

      <div class="analog-clock" aria-hidden="true" id="analogClock">
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="hand second-hand" id="secondHand"></div>
        <div class="clock-pin"></div>
      </div>

      <div class="digital-time" id="digitalTime">--:--:--</div>

      <div class="countdown">
        <div class="countdown-label" id="countdownLabel">متبقي من الحصة الحالية</div>
        <div class="countdown-value" id="countdownValue">--:--</div>
      </div>

      <div class="progress-panel">
        <div class="progress-head">
          <span class="progress-percent" id="progressPercent">%0</span>
          <span>تقدم الحصة</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="date-card">
        <div class="weekday" id="weekday">--</div>
        <div class="date-line" id="hijriDate">--</div>
        <div class="date-line gregorian" id="gregorianDate">--</div>
      </div>

      <div class="schedule-cover">
        <table class="schedule-table" aria-label="جدول الحصص اليومي">
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>

      <div class="ticker-shell" aria-label="رسائل تربوية متحركة">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
