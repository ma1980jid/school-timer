<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مؤقت الحصص المدرسية</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#064b35">
  <link rel="icon" href="icons/default-icon.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<main class="app">

  <header class="header">
    <img id="schoolLogo" class="logo school" src="icons/default-icon.svg" alt="شعار المدرسة">

    <div class="title">
      <h1 id="schoolName">مدرسة الشيخ سيف بن حمد الأغبري</h1>
      <p id="scheduleName">( 5 - 12 )</p>
    </div>

    <div class="moe">
      <img src="icons/ministry-logo.png" alt="شعار وزارة التعليم">
      <span>وزارة التعليم</span>
    </div>
  </header>

  <section class="top-cards">
    <div class="info-card ended">
      <span>الحصة المنتهية</span>
      <h2 id="endedTitle">--</h2>
      <p id="endedTime">--</p>
    </div>

    <div class="info-card current">
      <span>الحصة الحالية</span>
      <h2 id="currentTitle">--</h2>
      <p id="currentTime">--</p>
    </div>

    <div class="info-card next">
      <span>الحصة القادمة</span>
      <h2 id="nextTitle">--</h2>
      <p id="nextTime">--</p>
    </div>

    <div class="info-card weather">
      <span>الطقس</span>
      <h2>38°</h2>
      <p>مشمس - مسقط</p>
    </div>
  </section>

  <section class="main-grid">

    <section class="clock-panel">
      <div id="analogClock" class="analog-clock">
        <div id="hourHand" class="hand hour-hand"></div>
        <div id="minuteHand" class="hand minute-hand"></div>
        <div id="secondHand" class="hand second-hand"></div>
        <div class="clock-pin"></div>
      </div>

      <div class="clock-data">
        <div id="digitalTime" class="digital-time">--:--:--</div>
        <div id="countdownLabel" class="label">متبقي من الحصة الحالية</div>
        <div id="countdownValue" class="countdown">--:--</div>

        <div class="progress-head">
          <span>تقدم الحصة</span>
          <strong id="progressPercent">%0</strong>
        </div>

        <div class="progress">
          <div id="progressFill"></div>
        </div>

        <div class="date-box">
          <strong id="weekday">--</strong>
          <span id="gregorianDate">--</span>
          <small id="hijriDate">--</small>
        </div>
      </div>
    </section>

    <section class="schedule-panel">
      <h2>جدول الحصص اليومي</h2>
      <table>
        <tbody id="scheduleBody"></tbody>
      </table>
    </section>

  </section>

  <footer class="footer">
    <a id="classroomLink" href="#">وضع الشاشة التفاعلية</a>
    <div id="tickerTrack" class="ticker-track"></div>
  </footer>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
