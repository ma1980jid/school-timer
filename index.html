<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مؤقت الحصص المدرسية</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f766e">
  <link rel="icon" href="icons/default-icon.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<main class="app">

  <header class="header">
    <div class="brand">
      <img id="schoolLogo" src="icons/default-icon.svg" alt="شعار المدرسة">
      <div>
        <h1>مدرسة الشيخ سيف بن حمد الأغبري</h1>
        <p>وزارة التعليم</p>
      </div>
    </div>

    <div class="date-box">
      <strong id="weekday">--</strong>
      <span id="gregorianDate">--</span>
      <small id="hijriDate">--</small>
    </div>
  </header>

  <section class="cards">
    <div class="card ended">
      <span>الحصة المنتهية</span>
      <h2 id="endedTitle">--</h2>
      <p id="endedTime">--</p>
    </div>

    <div class="card current">
      <span>الحصة الحالية</span>
      <h2 id="currentTitle">--</h2>
      <p id="currentTime">--</p>
    </div>

    <div class="card next">
      <span>الحصة القادمة</span>
      <h2 id="nextTitle">--</h2>
      <p id="nextTime">--</p>
    </div>
  </section>

  <section class="main-grid">
    <section class="clock-card">
      <div id="analogClock" class="analog-clock">
        <div id="hourHand" class="hand hour-hand"></div>
        <div id="minuteHand" class="hand minute-hand"></div>
        <div id="secondHand" class="hand second-hand"></div>
        <div class="clock-pin"></div>
      </div>

      <div class="time-info">
        <div id="digitalTime" class="digital-time">--:--:--</div>
        <div id="countdownLabel" class="label">متبقي من الحصة الحالية</div>
        <div id="countdownValue" class="countdown">--:--</div>

        <div class="progress-head">
          <span>تقدم الحصة</span>
          <strong id="progressPercent">%0</strong>
        </div>

        <div class="progress">
          <div id="progressFill"></div>
        </div>
      </div>
    </section>

    <section class="schedule-card">
      <h2>جدول الحصص اليومي</h2>
      <table>
        <tbody id="scheduleBody"></tbody>
      </table>
    </section>
  </section>

  <footer class="ticker">
    <a id="classroomLink" href="#">وضع الشاشة التفاعلية</a>
    <div id="tickerTrack" class="ticker-track"></div>
  </footer>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
