<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مؤقت الحصص المدرسية</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#064b35" />
  <link rel="icon" href="icons/default-icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="dashboard" aria-label="لوحة مؤقت الحصص المدرسية">

    <section class="live-layer">

      <div class="school-header">
        <img id="schoolLogo" class="school-logo" src="icons/default-icon.svg" alt="شعار المدرسة">
        <div>
          <h1 id="schoolName">مؤقت الحصص المدرسية</h1>
          <p id="scheduleName">جاري تحميل التوقيت...</p>
        </div>
        <div class="ministry-title">وزارة التعليم</div>
      </div>

      <div class="top-card ended-card">
        <div class="pill">الحصة المنتهية <span class="dot"></span></div>
        <div id="endedTitle" class="period-title">--</div>
        <div id="endedTime" class="period-time">--</div>
      </div>

      <div class="top-card current-card">
        <div class="pill">الحصة الحالية <span class="dot"></span></div>
        <div id="currentTitle" class="period-title">--</div>
        <div id="currentTime" class="period-time">--</div>
      </div>

      <div class="top-card next-card">
        <div class="pill">الحصة القادمة <span class="dot"></span></div>
        <div id="nextTitle" class="period-title">--</div>
        <div id="nextTime" class="period-time">--</div>
      </div>

      <div id="analogClock" class="analog-clock">
        <div id="hourHand" class="hand hour-hand"></div>
        <div id="minuteHand" class="hand minute-hand"></div>
        <div id="secondHand" class="hand second-hand"></div>
        <div class="clock-pin"></div>
      </div>

      <div id="digitalTime" class="digital-time">--:--:--</div>

      <div class="countdown">
        <div id="countdownLabel" class="countdown-label">متبقي من الحصة الحالية</div>
        <div id="countdownValue" class="countdown-value">--:--</div>
      </div>

      <div class="progress-panel">
        <div class="progress-head">
          <span id="progressPercent" class="progress-percent">%0</span>
          <span>تقدم الحصة</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div class="date-card">
        <div id="weekday" class="weekday">--</div>
        <div id="gregorianDate" class="date-line gregorian">--</div>
        <div id="hijriDate" class="date-line">--</div>
      </div>

      <div class="schedule-cover">
        <table class="schedule-table" aria-label="جدول الحصص اليومي">
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>

      <div class="ticker-shell" aria-label="رسائل تربوية متحركة">
        <a id="classroomLink" href="#" class="classroom-link">وضع الشاشة التفاعلية</a>
        <div id="tickerTrack" class="ticker-track"></div>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
