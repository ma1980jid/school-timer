<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f2e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>مؤقّت الحصص</title>
  <link rel="stylesheet" href="style.css?v=509">
  <link rel="stylesheet" href="desktop.css?v=3">
  <link rel="stylesheet" href="fixes.css?v=1">
  <link rel="stylesheet" href="tune.css?v=1">
</head>

<body>
  <main class="mobile-app">
    <div class="top-school-logo">
      <img id="schoolLogo" src="icons/school_logo.png" alt="شعار المدرسة">
    </div>

    <section class="period-cards">
      <div class="period-card previous">
        <span>الحصة السابقة</span>
        <strong id="previousName">--</strong>
        <small id="previousTime">--</small>
      </div>

      <div class="period-card current">
        <span>الحصة الحالية</span>
        <strong id="currentName">--</strong>
        <small id="currentTime">--</small>
      </div>

      <div class="period-card next">
        <span>الحصة القادمة</span>
        <strong id="nextName">--</strong>
        <small id="nextTime">--</small>
      </div>
    </section>

    <section class="clock-panel">
      <div class="clock-area">
        <div id="digitalClock" class="digital-clock">--:--</div>
        <div id="countLabel" class="count-label">متبقي من الحصة الحالية</div>
        <div id="remainingTime" class="remaining-time">--:--</div>
      </div>

      <div class="date-box">
        <strong id="weekday">--</strong>
        <span id="gregorianDate">--</span>
        <span id="hijriDate">--</span>
      </div>
    </section>

    <section class="middle-cards">
      <div class="mini-card school-name-card">
        <p id="schoolName">مدرسة الشيخ سيف بن حمد الأغبري</p>
      </div>

      <div class="mini-card vision-card">
        <p id="visionText">رؤيتنا: تعليم ملهم لمستقبل مشرق</p>
      </div>
    </section>

    <section class="schedule-section">
      <div class="schedule-grid">
        <table><tbody id="scheduleCol1"></tbody></table>
        <table><tbody id="scheduleCol2"></tbody></table>
      </div>
    </section>

    <footer class="ticker">
      <div id="tickerTrack" class="ticker-track"></div>
    </footer>
  </main>

  <script src="script.js?v=510" defer></script>
  <script src="time-fixes.js?v=1" defer></script>
</body>
</html>
