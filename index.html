<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مؤقت الحصص المدرسية</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="icon" href="icons/default-icon.svg" />
  <link rel="apple-touch-icon" href="icons/default-icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app teacher-mode">
    <section class="top-card">
      <div class="brand">
        <div class="logo-wrap"><img id="schoolLogo" src="icons/default-icon.svg" alt="شعار المدرسة"></div>
        <div>
          <h1 id="schoolName">مؤقت الحصص المدرسية</h1>
          <p id="scheduleName">جاري تحميل التوقيت...</p>
        </div>
      </div>
      <div class="date-clock">
        <div id="dayName">--</div>
        <div id="dateText">--</div>
        <div id="currentTime">--:--:--</div>
      </div>
    </section>

    <div id="alertBar" class="alert-bar hidden"></div>

    <section class="cards-grid">
      <article class="main-card current-card">
        <div class="card-label">الحصة الحالية</div>
        <h2 id="currentPeriod">--</h2>
        <div id="remainingTime" class="remaining">--:--</div>
        <p id="periodRange" class="range">--</p>
        <div id="progressTrack" class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      </article>

      <article class="next-card">
        <div class="card-label">الحصة القادمة</div>
        <h2 id="nextPeriod">--</h2>
        <p id="nextRange" class="range">--</p>
        <p id="nextStartsIn" class="starts-in">--</p>
      </article>
    </section>

    <section class="schedule-card">
      <div class="section-head">
        <h2>جدول اليوم</h2>
        <span id="scheduleCount">0 فترة</span>
      </div>
      <div id="scheduleList" class="schedule-list"></div>
    </section>

    <footer>
      <span>مؤقت الحصص المدرسية</span>
      <a id="classroomLink" href="#">وضع الشاشة التفاعلية</a>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
