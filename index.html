<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f2e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>مؤقّت الحصص</title>

  <link rel="stylesheet" href="style.css?v=509">
  <link rel="stylesheet" href="desktop.css?v=3">
  <link rel="stylesheet" href="tune.css?v=2">
</head>

<body>
  <main class="mobile-app">
    <div class="top-school-logo">
      <img id="schoolLogo" src="icons/school_logo.png" alt="شعار المدرسة">
    </div>

   <section class="top-cards">
  <div class="period-card next-card">
    <div class="period-title">الحصة القادمة</div>
    <div id="nextName" class="period-name">--</div>
    <div class="period-line"></div>
    <div id="nextTime" class="period-time">--</div>
  </div>

  <div class="period-card current-card">
    <div class="period-title">الحصة الحالية</div>
    <div id="currentName" class="period-name">--</div>
    <div class="period-line"></div>
    <div id="currentTime" class="period-time">--</div>
  </div>

  <div class="period-card previous-card">
    <div class="period-title">الحصة السابقة</div>
    <div id="previousName" class="period-name">--</div>
    <div class="period-line"></div>
    <div id="previousTime" class="period-time">--</div>
  </div>
</section>

    <section class="hero-layout">
  <div class="green-panel">
    <div class="green-panel-overlay">
      <div class="green-date-box">
        <div id="weekday" class="weekday-text">الخميس</div>
        <div id="gregorianDate" class="date-text">18 يونيو 2026</div>
        <div id="hijriDate" class="date-text">3 محرم 1448 هـ</div>
      </div>

      <div class="green-time-box">
        <div id="digitalClock" class="digital-clock">09:58</div>
        <div id="countLabel" class="count-label">متبقي من الحصة الحالية</div>
        <div id="remainingTime" class="remaining-time">16:36</div>
      </div>
    </div>
  </div>

  <div class="schedule-panel">
    <table class="schedule-table">
      <tbody id="scheduleCol1"></tbody>
    </table>

    <table class="schedule-table">
      <tbody id="scheduleCol2"></tbody>
    </table>
  </div>
</section>

    <section class="ticker-bar">
  <div class="ticker-star left-star">✿</div>

  <div class="ticker-window">
    <div id="tickerTrack" class="ticker-track"></div>
  </div>

  <div class="ticker-star right-star">✿</div>
</section>

    <section class="clock-panel">
      <div class="clock-area">
        <div id="digitalClock" class="digital-clock">--:--</div>
        <div id="countLabel" class="count-label">متبقي من الحصة الحالية</div>
        <div id="remainingTime" class="remaining-time">--:--</div>
      </div>

      <div class="date-box">
        <strong id="weekday">--</strong>
        <span id="gregorianDate">--</span>
        <span id="hijriDate">--</span>
      </div>
    </section>

    <section class="middle-cards">
      <div class="mini-card school-name-card">
        <p id="schoolName">مدرسة الشيخ سيف بن حمد الأغبري</p>
      </div>

      <div class="mini-card vision-card">
        <p id="visionText">رؤيتنا: تعليم ملهم لمستقبل مشرق</p>
      </div>
    </section>

    <section class="schedule-section">
      <div class="schedule-grid">
        <table><tbody id="scheduleCol1"></tbody></table>
        <table><tbody id="scheduleCol2"></tbody></table>
      </div>
    </section>

    <footer class="ticker">
      <div id="tickerTrack" class="ticker-track"></div>
    </footer>
  </main>

  <script src="script.js?v=511" defer></script>
</body>
</html>
