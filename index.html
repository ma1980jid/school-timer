<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مؤقت الحصص المدرسية</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#064b35">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<main class="app">

  <header class="header">
    <img class="logo school" src="icons/school-logo.svg" alt="شعار المدرسة">

    <div class="title">
      <h1>مؤقت الحصص المدرسية</h1>
      <p>مدرسة الشيخ سيف بن حمد الأغبري</p>
      <div class="header-date">
        <span id="weekday">--</span>
        <span id="gregorianDate">--</span>
        <span id="hijriDate">--</span>
      </div>
    </div>

    <div class="moe">
      <img src="icons/ministry-logo.png" alt="شعار وزارة التعليم">
    </div>
  </header>

  <section class="top-cards">
    <div class="info-card ended">
      <span>الحصة المنتهية</span>
      <h2 id="endedTitle">--</h2>
      <p id="endedTime">--</p>
    </div>

    <div class="info-card current">
      <span>الحصة الحالية</span>
      <h2 id="currentTitle">--</h2>
      <p id="currentTime">--</p>
    </div>

    <div class="info-card next">
      <span>الحصة القادمة</span>
      <h2 id="nextTitle">--</h2>
      <p id="nextTime">--</p>
    </div>
  </section>

  <section class="clock-panel">
    <div id="digitalTime" class="digital-time">--:--:--</div>
    <div id="countdownLabel" class="label">متبقي من الحصة الحالية</div>
    <div id="countdownValue" class="countdown">--:--</div>

    <div class="progress-head">
      <span>تقدم الفترة</span>
      <strong id="progressPercent">0%</strong>
    </div>

    <div class="progress">
      <div id="progressFill"></div>
    </div>
  </section>

  <section class="schedule-panel">
    <h2>جدول الفترات اليومي</h2>

    <div class="schedule-columns">
      <table>
        <tbody id="scheduleBodyRight"></tbody>
      </table>

      <table>
        <tbody id="scheduleBodyLeft"></tbody>
      </table>
    </div>
  </section>

<footer class="footer">
  <div id="tickerTrack" class="ticker-track"></div>
</footer>

</main>

<script src="script.js"></script>
</body>
</html>
