<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مؤقت الحصص المدرسية</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#064b35" />
  <link rel="icon" href="icons/default-icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="dashboard">

    <header class="header">
      <img id="schoolLogo" class="school-logo" src="icons/default-icon.svg" alt="شعار المدرسة">
      <div class="title">
        <h1 id="schoolName">مدرسة الشيخ سيف بن حمد الأغبري</h1>
        <p id="scheduleName">جاري تحميل التوقيت...</p>
      </div>
      <div class="ministry">وزارة التعليم</div>
      <div class="date-card">
        <strong id="weekday">--</strong>
        <span id="gregorianDate">--</span>
        <small id="hijriDate">--</small>
      </div>
    </header>

    <section class="cards-row">
      <div class="period-card ended-card">
        <div class="pill">الحصة المنتهية <span class="dot"></span></div>
        <h2 id="endedTitle">--</h2>
        <p id="endedTime">--</p>
      </div>

      <div class="period-card current-card">
        <div class="pill">الحصة الحالية <span class="dot"></span></div>
        <h2 id="currentTitle">--</h2>
        <p id="currentTime">--</p>
      </div>

      <div class="period-card next-card">
        <div class="pill">الحصة القادمة <span class="dot"></span></div>
        <h2 id="nextTitle">--</h2>
        <p id="nextTime">--</p>
      </div>
    </section>

    <section class="main-grid">
      <section class="clock-panel">
        <div id="analogClock" class="analog-clock">
          <div id="hourHand" class="hand hour-hand"></div>
          <div id="minuteHand" class="hand minute-hand"></div>
          <div id="secondHand" class="hand second-hand"></div>
          <div class="clock-pin"></div>
        </div>

        <div class="time-info">
          <div id="digitalTime" class="digital-time">--:--:--</div>
          <div id="countdownLabel" class="countdown-label">متبقي من الحصة الحالية</div>
          <div id="countdownValue" class="countdown-value">--:--</div>

          <div class="progress-head">
            <span>تقدم الحصة</span>
            <span id="progressPercent">%0</span>
          </div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
      </section>

      <section class="schedule-panel">
        <h2>جدول الحصص اليومي</h2>
        <div class="schedule-cover">
          <table class="schedule-table">
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </section>
    </section>

    <footer class="ticker-shell">
      <a id="classroomLink" href="#">وضع الشاشة التفاعلية</a>
      <div id="tickerTrack" class="ticker-track"></div>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
