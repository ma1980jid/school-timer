<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f2e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>مؤقّت الحصص</title>
  <link rel="stylesheet" href="style.css?v=cards-clock-02">
  <style>
    @media (max-width: 768px){
      .schedule-section{top:60.8%!important;height:31.8%!important;left:7.2%!important;right:7.2%!important;overflow:hidden!important}
      .schedule-grid{height:100%!important;padding:8px 8px 6px!important;gap:2.2%!important;align-content:stretch!important}
      .schedule-grid table{width:100%!important;height:100%!important;table-layout:fixed!important;border-collapse:collapse!important}
      .schedule-grid tr{height:auto!important}
      .schedule-grid td{padding:2px 1px!important;line-height:1!important;font-size:clamp(7px,1.85vw,12px)!important;vertical-align:middle!important}
      .schedule-grid td:nth-child(1){width:35%!important;font-size:clamp(7px,1.9vw,12px)!important}
      .schedule-grid td:nth-child(2),.time-cell{width:43%!important;font-size:clamp(8px,2.05vw,13px)!important}
      .schedule-grid td:nth-child(3),.status-cell{width:22%!important;font-size:clamp(7px,1.75vw,11px)!important}
      .current-row td{font-size:clamp(8px,2vw,13px)!important}
      .ticker{bottom:1.5%!important;height:3%!important}
    }
  </style>
</head>
<body>
  <main class="timer-app">
    <div class="school-logo-wrap">
      <img id="schoolLogo" src="icons/school_logo.png" alt="شعار المدرسة">
    </div>
    <section class="top-cards">
      <div class="period-card next-card"><div class="period-title">الحصة القادمة</div><div id="nextName" class="period-name">--</div><div class="period-line"></div><div id="nextTime" class="period-time">--</div></div>
      <div class="period-card current-card"><div class="period-title">الحصة الحالية</div><div id="currentName" class="period-name">--</div><div class="period-line"></div><div id="currentTime" class="period-time">--</div></div>
      <div class="period-card previous-card"><div class="period-title">الحصة السابقة</div><div id="previousName" class="period-name">--</div><div class="period-line"></div><div id="previousTime" class="period-time">--</div></div>
    </section>
    <section class="clock-panel">
      <div class="date-box"><strong id="weekday">--</strong><span id="gregorianDate">--</span><span id="hijriDate">--</span></div>
      <div class="clock-area"><div id="digitalClock" class="digital-clock">--:--</div><div id="countLabel" class="count-label">متبقي من الحصة الحالية</div><div id="remainingTime" class="remaining-time">--:--</div></div>
    </section>
    <section class="middle-cards">
      <div class="mini-card school-name-card"><p id="schoolName">مدرسة الشيخ سيف بن حمد الأغبري</p></div>
      <div class="mini-card vision-card"><p id="visionText">رؤيتنا: تعليم ملهم لمستقبل مشرق</p></div>
    </section>
    <section class="schedule-section"><div class="schedule-grid"><table><tbody id="scheduleCol1"></tbody></table><table><tbody id="scheduleCol2"></tbody></table></div></section>
    <footer class="ticker"><div id="tickerTrack" class="ticker-track"></div></footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js?v=supabase-read-02" defer></script>
</body>
</html>
