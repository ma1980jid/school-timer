<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم المدرسة</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <section class="schedule-card">
      <div class="section-title">
        <h2>لوحة تحكم المدرسة</h2>
        <span id="dashboardSchoolName">جاري التحميل...</span>
      </div>

      <div id="dashboardStatus" class="alert-bar hidden"></div>

      <div class="message-card">
        <span>رابط المعلمين / الهاتف / التابلت</span>
        <strong id="teacherLink">--</strong>
        <div>
          <button class="admin-btn" onclick="copyTeacherLink()">نسخ</button>
          <button class="admin-btn" onclick="openTeacherLink()">فتح</button>
        </div>
      </div>

    </section>

    <section class="schedule-card">
      <div class="section-title">
        <h2>إعدادات التصميم</h2>
        <span>الألوان والخلفية فقط</span>
      </div>

      <div style="display:grid; gap:12px;">
        <label>اللون الرئيسي</label>
        <input id="primaryColorInput" type="color" />

        <label>اللون الثانوي</label>
        <input id="secondaryColorInput" type="color" />

        <label>لون الخلفية</label>
        <input id="backgroundColorInput" type="color" />

        <input id="themeStyleInput" type="text" placeholder="نمط التصميم: omani / modern / classic" />

        <button class="admin-btn" onclick="saveDesignSettings()">حفظ إعدادات التصميم</button>
      </div>
    </section>

    <section class="schedule-card">
      <div class="section-title">
        <h2>اختيار التوقيت النشط</h2>
        <span>اختر توقيتًا واحدًا فقط</span>
      </div>

      <div id="dashboardSchedules" class="schedule-list"></div>
    </section>

    <section class="schedule-card">
      <div class="section-title">
        <h2>إدارة الرسائل التربوية</h2>
        <span>خاصة بهذه المدرسة</span>
      </div>

      <div style="display:grid; gap:10px; margin-bottom:18px;">
        <input id="messageText" type="text" placeholder="اكتب الرسالة التربوية" />
        <input id="messageType" type="text" placeholder="نوع الرسالة: تربوية / تحفيزية / تعليمية" />
        <button class="admin-btn" onclick="addMessage()">إضافة رسالة</button>
      </div>

      <div id="dashboardMessages" class="schedule-list"></div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
