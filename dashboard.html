<!doctype html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة مدير المدرسة</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Tahoma,Arial,sans-serif;
      background:#f8f2e8;
      color:#064b35;
      padding:24px;
      line-height:1.8;
    }

    .page{
      max-width:900px;
      margin:auto;
      background:#fff;
      border-radius:18px;
      padding:24px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }

    h1{
      font-size:26px;
      margin-bottom:18px;
      color:#064b35;
      text-align:center;
    }

    .field{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-weight:900;
      margin-bottom:6px;
    }

    select,
    input{
      width:100%;
      padding:12px;
      border:1px solid #d6c7a8;
      border-radius:10px;
      font-size:17px;
      font-weight:700;
      background:#fffdf8;
      color:#064b35;
    }

    .links{
      margin-top:28px;
      padding-top:18px;
      border-top:2px solid #efe3c8;
    }

    .link-box{
      margin-top:12px;
      padding:14px;
      background:#f8f2e8;
      border-radius:12px;
      word-break:break-all;
      direction:ltr;
      text-align:left;
      font-size:15px;
      color:#111;
    }

    button{
      margin-top:10px;
      width:100%;
      padding:13px;
      border:0;
      border-radius:10px;
      background:#064b35;
      color:#fff;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }

    .note{
      margin-top:18px;
      color:#7a5c1c;
      font-weight:700;
      text-align:center;
    }
  </style>

</head>

<body>
  <main class="page">
    <h1>لوحة مدير المدرسة</h1>

```
<div class="field">
  <label for="schedule">اختيار التوقيت النشط</label>
  <select id="schedule">
    <option value="normalWithPrayer">التوقيت الأساسي مع الصلاة</option>
    <option value="normalWithoutPrayer">التوقيت الأساسي بدون الصلاة</option>
    <option value="ramadan">توقيت رمضان</option>
    <option value="exam">توقيت الاختبارات</option>
  </select>
</div>

<div class="field">
  <label for="activityDay">اختيار يوم النشاط</label>
  <select id="activityDay">
    <option value="0">الأحد</option>
    <option value="1">الاثنين</option>
    <option value="2">الثلاثاء</option>
    <option value="3">الأربعاء</option>
    <option value="4">الخميس</option>
    <option value="5">الجمعة</option>
    <option value="6">السبت</option>
  </select>
</div>

<div class="field">
  <label for="activityPosition">موضع حصة النشاط</label>
  <select id="activityPosition">
    <option value="afterAssembly">بعد الطابور</option>
    <option value="afterBreak">بعد الفسحة</option>
  </select>
</div>

<div class="field">
  <label for="activityEnabled">تفعيل حصة النشاط</label>
  <select id="activityEnabled">
    <option value="1">مفعلة</option>
    <option value="0">غير مفعلة</option>
  </select>
</div>

<button onclick="generateLinks()">توليد روابط المعلمين</button>

<section class="links">
  <h2>رابط شاشة الحاسوب</h2>
  <div id="desktopLink" class="link-box">اضغط توليد الروابط</div>

  <h2 style="margin-top:18px;">رابط الهاتف والآيباد</h2>
  <div id="mobileLink" class="link-box">اضغط توليد الروابط</div>
</section>

<p class="note">
  بعد توليد الرابط انسخه وأرسله للمعلمين حسب نوع الجهاز.
</p>
```

  </main>

  <script>
    function generateLinks(){
      const schedule = document.getElementById("schedule").value;
      const activityDay = document.getElementById("activityDay").value;
      const activityPosition = document.getElementById("activityPosition").value;
      const activityEnabled = document.getElementById("activityEnabled").value;

      const base = "https://ma1980jid.github.io/school-timer/";

      const params =
        "?schedule=" + encodeURIComponent(schedule) +
        "&activityDay=" + encodeURIComponent(activityDay) +
        "&activityPosition=" + encodeURIComponent(activityPosition) +
        "&activityEnabled=" + encodeURIComponent(activityEnabled);

      const desktop =
        base + params + "&view=desktop&v=" + Date.now();

      const mobile =
        base + params + "&view=mobile&v=" + Date.now();

      document.getElementById("desktopLink").textContent = desktop;
      document.getElementById("mobileLink").textContent = mobile;
    }
  </script>

</body>
</html>
