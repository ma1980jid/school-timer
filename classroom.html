<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وضع الشاشة التفاعلية</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="icon" href="icons/default-icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="classroom-body">
  <main class="classroom-app">

    <header class="classroom-hero">
      <div class="classroom-logos">
        <img class="ministry-logo" src="icons/ministry-logo.png" alt="شعار وزارة التربية والتعليم" />
        <img id="schoolLogo" class="school-logo" src="icons/default-icon.svg" alt="شعار المدرسة" />
      </div>

      <div class="classroom-title">
        <p class="ministry-text">وزارة التربية والتعليم</p>
        <h1 id="schoolName">مؤقت الحصص المدرسية</h1>
        <p id="scheduleName">جاري تحميل التوقيت...</p>
      </div>

      <div class="classroom-time">
        <span id="dayName">--</span>
        <strong id="currentTime">--:--:--</strong>
        <span id="dateText">--</span>
      </div>
    </header>

    <div id="alertBar" class="alert-bar hidden"></div>

    <section class="classroom-main">
      <div class="classroom-current">
        <span>الحصة الحالية</span>
        <h2 id="currentPeriod">--</h2>
        <strong id="remainingTime">--:--</strong>
        <p id="periodRange">--</p>

        <div class="progress classroom-progress">
          <div id="progressFill"></div>
        </div>
      </div>

      <div class="classroom-next">
        <span>الحصة القادمة</span>
        <h2 id="nextPeriod">--</h2>
        <p id="nextRange">--</p>
        <small id="nextStartsIn"></small>
      </div>
    </section>

    <section class="classroom-message">
      <span>رسالة تربوية</span>
      <strong id="educationMessage">الوقت قيمة لا تعوض</strong>
    </section>

    <section class="schedule-card classroom-schedule">
      <div class="section-title">
        <h2>جدول اليوم</h2>
        <span id="scheduleCount">0 فترة</span>
      </div>

      <div id="scheduleList" class="schedule-list"></div>
    </section>

    <footer class="footer modern-footer">
      <div>
        <strong>وزارة التربية والتعليم</strong>
        <span>مدرسة الشيخ سيف بن حمد الأغبري (5-12)</span>
      </div>

      <div>
        <span>إعداد وتطوير</span>
        <strong>ماجد بن سيف الأغبري</strong>
      </div>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
