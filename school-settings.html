<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعديل بيانات المدرسة</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app">

  <section class="schedule-card">

    <div class="section-title">
      <h2>تعديل بيانات المدرسة</h2>
      <span id="settingsSchoolName">
        جاري التحميل...
      </span>
    </div>

    <div id="settingsStatus" class="alert-bar hidden"></div>

    <div style="display:grid;gap:14px">

      <!-- اسم المدرسة -->
      <input
        id="schoolNameInput"
        type="text"
        placeholder="اسم المدرسة">

      <!-- الرابط المختصر -->
      <input
        id="schoolSlugInput"
        type="text"
        placeholder="الرابط المختصر">

      <!-- المحافظة -->
      <input
        id="governorateInput"
        type="text"
        placeholder="المحافظة">

      <!-- الولاية -->
      <input
        id="wilayatInput"
        type="text"
        placeholder="الولاية">


      <hr>


      <!-- شعار المدرسة -->
      <h3>شعار المدرسة</h3>
      <p style="margin:0;color:#64748b;font-weight:700;line-height:1.8">
        ارفع شعار المدرسة مرة واحدة فقط. سيستخدمه النظام تلقائيًا داخل صفحة المؤقت، وسيُنشئ منه أيقونة مربعة للتطبيق.
      </p>

      <div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap">
        <div>
          <div style="font-weight:900;margin-bottom:8px">الشعار داخل الصفحة</div>
          <img
            id="logoPreview"
            src=""
            style="
              width:130px;
              height:130px;
              object-fit:contain;
              border:1px solid #ddd;
              border-radius:16px;
              background:white;
              padding:10px">
        </div>

        <div>
          <div style="font-weight:900;margin-bottom:8px">أيقونة التطبيق التلقائية</div>
          <img
            id="iconPreview"
            src=""
            style="
              width:90px;
              height:90px;
              object-fit:contain;
              border:1px solid #ddd;
              border-radius:16px;
              background:white;
              padding:10px">
        </div>
      </div>

      <input
        id="logoFile"
        type="file"
        accept="image/*">


      <hr>


      <!-- اللون الرئيسي -->
      <label>اللون الرئيسي</label>

      <input
        id="primaryColorInput"
        type="color">


      <!-- اللون الثانوي -->
      <label>اللون الثانوي</label>

      <input
        id="secondaryColorInput"
        type="color">


      <!-- لون الخلفية -->
      <label>لون الخلفية</label>

      <input
        id="backgroundColorInput"
        type="color">


      <!-- نمط الخلفية -->
      <input
        id="themeStyleInput"
        type="text"
        placeholder="نمط التصميم: omani">


      <hr>


      <!-- حالة المدرسة -->
      <label style="font-size:20px">

        <input
          id="isActiveInput"
          type="checkbox">

        المدرسة نشطة

      </label>


      <button
        class="admin-btn"
        onclick="saveSchoolSettings()">

        حفظ التعديلات

      </button>


      <button
        class="admin-btn"
        onclick="goBack()">

        العودة للوحة مدير النظام

      </button>

    </div>

  </section>

</main>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>

<script src="school-settings.js"></script>

</body>
</html>
