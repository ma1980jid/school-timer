<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعديل بيانات المدرسة</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <section class="schedule-card">
      <div class="section-title">
        <h2>تعديل بيانات المدرسة</h2>
        <span id="settingsSchoolName">جاري التحميل...</span>
      </div>

      <div id="settingsStatus" class="alert-bar hidden"></div>

      <div style="display:grid; gap:12px;">
        <input id="schoolNameInput" type="text" placeholder="اسم المدرسة" />
        <input id="schoolSlugInput" type="text" placeholder="الرابط المختصر school_slug" />
        <input id="governorateInput" type="text" placeholder="المحافظة" />
        <input id="wilayatInput" type="text" placeholder="الولاية" />

        <input id="logoUrlInput" type="text" placeholder="رابط شعار المدرسة logo_url" />
        <input id="appIconUrlInput" type="text" placeholder="رابط أيقونة التطبيق app_icon_url" />

        <label>اللون الرئيسي</label>
        <input id="primaryColorInput" type="color" />

        <label>اللون الثانوي</label>
        <input id="secondaryColorInput" type="color" />

        <label>لون الخلفية</label>
        <input id="backgroundColorInput" type="color" />

        <input id="themeStyleInput" type="text" placeholder="نمط التصميم: omani / modern / classic" />

        <label>
          <input id="isActiveInput" type="checkbox" />
          المدرسة نشطة
        </label>

        <button class="admin-btn" onclick="saveSchoolSettings()">حفظ التعديلات</button>
        <button class="admin-btn" onclick="goBack()">العودة للوحة مدير النظام</button>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="school-settings.js"></script>
</body>
</html>
